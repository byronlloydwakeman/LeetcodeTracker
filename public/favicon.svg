<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#667eea" rx="8"/>
  
  <!-- Chart bars -->
  <!-- Bar 1 (Easy - Green) -->
  <rect x="8" y="40" width="10" height="16" fill="#48bb78" rx="2"/>
  
  <!-- Bar 2 (Medium - Orange) -->
  <rect x="22" y="28" width="10" height="28" fill="#ed8936" rx="2"/>
  
  <!-- Bar 3 (Hard - Red) -->
  <rect x="36" y="16" width="10" height="40" fill="#f56565" rx="2"/>
  
  <!-- Bar 4 (Target - Light) -->
  <rect x="50" y="20" width="10" height="36" fill="#cbd5e0" rx="2"/>
  
  <!-- Baseline -->
  <line x1="6" y1="56" x2="62" y2="56" stroke="white" stroke-width="2"/>
  
  <!-- Upward trend line -->
  <polyline points="8,50 22,38 36,24 50,22" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
